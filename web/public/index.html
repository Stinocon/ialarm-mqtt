<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iAlarm MQTT Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #3b82f6;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --dark-bg: #0f172a;
            --dark-surface: #1e293b;
            --dark-border: #334155;
            --light-bg: #ffffff;
            --light-surface: #f8fafc;
            --light-border: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            min-height: 100vh;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        body.dark {
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-lg);
        }

        .header h1 {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.online {
            background: var(--success-color);
        }

        .status-dot.offline {
            background: var(--danger-color);
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow-lg);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .alarm-status {
            text-align: center;
            padding: 40px;
        }

        .alarm-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .alarm-status.armed .alarm-icon {
            color: var(--danger-color);
            animation: shake 0.5s ease-in-out infinite alternate;
        }

        .alarm-status.disarmed .alarm-icon {
            color: var(--success-color);
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            100% { transform: translateX(5px); }
        }

        .status-text {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .status-description {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--success-color);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .zones-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .zone-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            border: 3px solid transparent;
        }

        .zone-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .zone-card.ok {
            border-color: var(--success-color);
        }

        .zone-card.problem {
            border-color: var(--danger-color);
        }

        .zone-card.open {
            border-color: var(--warning-color);
        }

        .zone-name {
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .zone-status {
            font-size: 0.9rem;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 500;
        }

        .zone-status.ok {
            background: #dcfce7;
            color: #166534;
        }

        .zone-status.problem {
            background: #fee2e2;
            color: #991b1b;
        }

        .zone-status.open {
            background: #fef3c7;
            color: #92400e;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .metric {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        .metric-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .metric-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .events-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .event-item {
            padding: 15px;
            border-bottom: 1px solid var(--light-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .event-item:last-child {
            border-bottom: none;
        }

        .event-time {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .event-message {
            font-weight: 500;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: var(--shadow-lg);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            border-left: 4px solid var(--success-color);
        }

        .toast.error {
            border-left: 4px solid var(--danger-color);
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .zones-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🏠 iAlarm Dashboard</h1>
            <div class="status-indicator">
                <span id="connectionStatus">Connecting...</span>
                <div id="statusDot" class="status-dot offline"></div>
            </div>
        </header>

        <div class="dashboard">
            <div class="card alarm-status" id="alarmStatus">
                <h2>Alarm Status</h2>
                <div class="alarm-icon">🔒</div>
                <div class="status-text" id="statusText">Loading...</div>
                <div class="status-description" id="statusDescription">Connecting to alarm system</div>
                <div class="controls">
                    <button class="btn btn-success" onclick="armAlarm('home')">Arm Home</button>
                    <button class="btn btn-primary" onclick="armAlarm('away')">Arm Away</button>
                    <button class="btn btn-danger" onclick="disarmAlarm()">Disarm</button>
                </div>
            </div>

            <div class="card">
                <h2>System Health</h2>
                <div class="metrics">
                    <div class="metric">
                        <div class="metric-value" id="healthScore">--</div>
                        <div class="metric-label">Health Score</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value" id="uptime">--</div>
                        <div class="metric-label">Uptime</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value" id="messageCount">--</div>
                        <div class="metric-label">Messages</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Zones Status</h2>
            <div class="zones-grid" id="zonesGrid">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Recent Events</h2>
            <div class="events-list" id="eventsList">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        class Dashboard {
            constructor() {
                this.ws = null;
                this.reconnectAttempts = 0;
                this.maxReconnectAttempts = 5;
                this.reconnectDelay = 1000;
                this.init();
            }

            init() {
                this.connectWebSocket();
                this.loadInitialData();
                this.startPolling();
            }

            connectWebSocket() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}`;
                
                this.ws = new WebSocket(wsUrl);
                
                this.ws.onopen = () => {
                    this.updateConnectionStatus('Connected', 'online');
                    this.reconnectAttempts = 0;
                };
                
                this.ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        this.handleWebSocketMessage(data);
                    } catch (error) {
                        console.error('Error parsing WebSocket message:', error);
                    }
                };
                
                this.ws.onclose = () => {
                    this.updateConnectionStatus('Disconnected', 'offline');
                    this.scheduleReconnect();
                };
                
                this.ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    this.updateConnectionStatus('Error', 'offline');
                };
            }

            scheduleReconnect() {
                if (this.reconnectAttempts < this.maxReconnectAttempts) {
                    this.reconnectAttempts++;
                    setTimeout(() => {
                        this.connectWebSocket();
                    }, this.reconnectDelay * this.reconnectAttempts);
                }
            }

            updateConnectionStatus(status, className) {
                document.getElementById('connectionStatus').textContent = status;
                const statusDot = document.getElementById('statusDot');
                statusDot.className = `status-dot ${className}`;
            }

            async loadInitialData() {
                try {
                    await Promise.all([
                        this.loadStatus(),
                        this.loadZones(),
                        this.loadEvents(),
                        this.loadHealth()
                    ]);
                } catch (error) {
                    console.error('Error loading initial data:', error);
                    this.showToast('Error loading data', 'error');
                }
            }

            async loadStatus() {
                const response = await fetch('/api/status');
                const status = await response.json();
                this.updateAlarmStatus(status);
            }

            async loadZones() {
                const response = await fetch('/api/zones');
                const zones = await response.json();
                this.updateZones(zones);
            }

            async loadEvents() {
                const response = await fetch('/api/events');
                const events = await response.json();
                this.updateEvents(events);
            }

            async loadHealth() {
                const response = await fetch('/api/health');
                const health = await response.json();
                this.updateHealth(health);
            }

            updateAlarmStatus(status) {
                const statusElement = document.getElementById('alarmStatus');
                const statusText = document.getElementById('statusText');
                const statusDescription = document.getElementById('statusDescription');
                const alarmIcon = statusElement.querySelector('.alarm-icon');

                statusElement.className = `card alarm-status ${status.armed ? 'armed' : 'disarmed'}`;
                statusText.textContent = status.armed ? 'ARMED' : 'DISARMED';
                statusDescription.textContent = status.armed ? 
                    `Armed in ${status.mode || 'unknown'} mode` : 
                    'System is disarmed and ready';
                alarmIcon.textContent = status.armed ? '🚨' : '🔒';
            }

            updateZones(zones) {
                const zonesGrid = document.getElementById('zonesGrid');
                
                if (!zones || zones.length === 0) {
                    zonesGrid.innerHTML = '<p>No zones configured</p>';
                    return;
                }

                zonesGrid.innerHTML = zones.map(zone => `
                    <div class="zone-card ${zone.status}">
                        <div class="zone-name">${zone.name || `Zone ${zone.id}`}</div>
                        <div class="zone-status ${zone.status}">${zone.status.toUpperCase()}</div>
                    </div>
                `).join('');
            }

            updateEvents(events) {
                const eventsList = document.getElementById('eventsList');
                
                if (!events || events.length === 0) {
                    eventsList.innerHTML = '<p>No recent events</p>';
                    return;
                }

                eventsList.innerHTML = events.map(event => `
                    <div class="event-item">
                        <div class="event-message">${event.message}</div>
                        <div class="event-time">${new Date(event.timestamp).toLocaleString()}</div>
                    </div>
                `).join('');
            }

            updateHealth(health) {
                document.getElementById('healthScore').textContent = health.score || '--';
                document.getElementById('uptime').textContent = this.formatUptime(health.uptime || 0);
                document.getElementById('messageCount').textContent = health.metrics?.messageCount || '--';
            }

            formatUptime(ms) {
                const seconds = Math.floor(ms / 1000);
                const minutes = Math.floor(seconds / 60);
                const hours = Math.floor(minutes / 60);
                const days = Math.floor(hours / 24);

                if (days > 0) return `${days}d ${hours % 24}h`;
                if (hours > 0) return `${hours}h ${minutes % 60}m`;
                if (minutes > 0) return `${minutes}m ${seconds % 60}s`;
                return `${seconds}s`;
            }

            handleWebSocketMessage(data) {
                switch (data.type) {
                    case 'status':
                        this.updateAlarmStatus(data.data);
                        break;
                    case 'zones':
                        this.updateZones(data.data);
                        break;
                    case 'events':
                        this.updateEvents(data.data);
                        break;
                    case 'health':
                        this.updateHealth(data.data);
                        break;
                }
            }

            startPolling() {
                // Poll for health data every 30 seconds
                setInterval(() => {
                    this.loadHealth();
                }, 30000);
            }

            showToast(message, type = 'success') {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.className = `toast ${type}`;
                toast.classList.add('show');
                
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }
        }

        // Global functions for button clicks
        async function armAlarm(mode) {
            try {
                const response = await fetch('/api/alarm/arm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode })
                });
                
                const result = await response.json();
                if (result.success) {
                    dashboard.showToast(`Alarm armed in ${mode} mode`, 'success');
                } else {
                    dashboard.showToast(result.error || 'Failed to arm alarm', 'error');
                }
            } catch (error) {
                dashboard.showToast('Error arming alarm', 'error');
            }
        }

        async function disarmAlarm() {
            const code = prompt('Enter disarm code:');
            if (!code) return;

            try {
                const response = await fetch('/api/alarm/disarm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });
                
                const result = await response.json();
                if (result.success) {
                    dashboard.showToast('Alarm disarmed', 'success');
                } else {
                    dashboard.showToast(result.error || 'Failed to disarm alarm', 'error');
                }
            } catch (error) {
                dashboard.showToast('Error disarming alarm', 'error');
            }
        }

        // Initialize dashboard
        const dashboard = new Dashboard();
    </script>
</body>
</html>
